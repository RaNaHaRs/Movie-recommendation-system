<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appName} + ' | Sign Up'">MovieSearch | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/site.js}"></script>
</head>
<body class="app-page page-auth">
<div class="page-loader" aria-hidden="true"></div>
<header th:replace="~{fragments/chrome :: publicHeader('signup')}"></header>

<main class="auth-stage">
    <section class="auth-card glass-panel" data-reveal>
        <h1>Sign Up</h1>

        <form class="auth-form" th:action="@{/signup}" th:object="${signUpForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label class="auth-field">
                <span>Username</span>
                <input th:field="*{username}" type="text" autocomplete="username" required>
                <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Username error</span>
            </label>

            <label class="auth-field">
                <span>Email</span>
                <input th:field="*{email}" type="email" autocomplete="email" required>
                <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email error</span>
            </label>

            <label class="auth-field">
                <span>Password</span>
                <div class="input-wrap">
                    <input id="signupPassword" th:field="*{password}" type="password" autocomplete="new-password" required>
                    <button class="password-toggle" type="button" data-password-toggle aria-controls="signupPassword" aria-label="Show password">
                        <span class="password-toggle__eye" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><path d="M1.5 12S5.5 5 12 5s10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12Zm10.5 4a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path></svg>
                        </span>
                        <span class="password-toggle__eye-off" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><path d="M3 3 21 21M10.7 6.1A10.9 10.9 0 0 1 12 6c6.5 0 10.5 6 10.5 6a18 18 0 0 1-4.2 4.8M6.1 6.8A18.7 18.7 0 0 0 1.5 12S5.5 18 12 18c1.1 0 2.1-.2 3-.5M9.9 9.9a3 3 0 0 0 4.2 4.2"></path></svg>
                        </span>
                    </button>
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Password error</span>
            </label>

            <label class="auth-field">
                <span>Confirm Password</span>
                <div class="input-wrap">
                    <input id="signupConfirmPassword" th:field="*{confirmPassword}" type="password" autocomplete="new-password" required>
                    <button class="password-toggle" type="button" data-password-toggle aria-controls="signupConfirmPassword" aria-label="Show password">
                        <span class="password-toggle__eye" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><path d="M1.5 12S5.5 5 12 5s10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12Zm10.5 4a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path></svg>
                        </span>
                        <span class="password-toggle__eye-off" aria-hidden="true">
                            <svg viewBox="0 0 24 24"><path d="M3 3 21 21M10.7 6.1A10.9 10.9 0 0 1 12 6c6.5 0 10.5 7 10.5 7a18 18 0 0 1-4.2 4.8M6.1 6.8A18.7 18.7 0 0 0 1.5 12S5.5 18 12 18c1.1 0 2.1-.2 3-.5M9.9 9.9a3 3 0 0 0 4.2 4.2"></path></svg>
                        </span>
                    </button>
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Confirm password error</span>
            </label>

            <button class="primary-button primary-button--full" type="submit">Create Account</button>
        </form>

        <a class="auth-switch" th:href="@{/login}" data-transition-link>Login</a>
    </section>
</main>
</body>
</html>
