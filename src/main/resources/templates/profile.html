<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appName} + ' | Profile'">MovieSearch | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/site.js}"></script>
</head>
<body class="app-page page-profile">
<div class="page-loader" aria-hidden="true"></div>
<header th:replace="~{fragments/chrome :: appNavbar('profile')}"></header>

<main class="dashboard-shell">
    <section class="profile-panel glass-panel" data-reveal>
        <img class="profile-avatar" th:if="${viewer != null and !#strings.isEmpty(viewer.profileImage)}" th:src="${viewer.profileImage}" th:alt="${viewer.username + ' avatar'}">
        <div class="profile-avatar profile-avatar--fallback" th:if="${viewer == null or #strings.isEmpty(viewer.profileImage)}" th:text="${viewer != null ? #strings.substring(viewer.username, 0, 1) : 'V'}">V</div>
        <div class="profile-panel__copy">
            <span class="eyebrow">Profile</span>
            <h1 th:text="${viewer != null ? viewer.displayName : 'Viewer'}">Viewer</h1>
            <p th:text="${viewer != null ? '@' + viewer.username : '@viewer'}">@viewer</p>
            <p th:text="${viewer != null ? viewer.email : 'viewer@example.com'}">viewer@example.com</p>
            <p th:text="${viewer != null ? viewer.role : 'USER'}">USER</p>
            <p th:text="${'Member since ' + profileMemberSince}">Member since 2026-03-31T00:00:00Z</p>
        </div>
    </section>

    <section class="stat-grid" data-reveal>
        <article class="stat-card glass-panel" th:each="stat : ${profileView.stats}">
            <span class="eyebrow" th:text="${stat.label}">Saved</span>
            <strong th:text="${stat.value}">3</strong>
        </article>
    </section>

    <section class="section-block" data-reveal>
        <div class="section-head">
            <h2>Taste Signals</h2>
        </div>
        <div class="pill-row">
            <span class="pill" th:each="signal : ${profileView.tasteSignals}" th:text="${signal}">Sci-fi noir</span>
        </div>
    </section>

    <section class="section-block" data-reveal>
        <div class="section-head">
            <h2>Recent Picks</h2>
        </div>
        <div class="movie-list-shell">
            <div class="movie-list">
                <article class="movie-list-item" th:each="movie, iter : ${profileView.recentMovies}" th:style="'--list-delay:' + (${iter.index} * 70) + 'ms;'">
                    <div class="movie-list-item__copy">
                        <h3 th:text="${movie.title}">Inception</h3>
                        <p class="movie-list-item__meta" th:text="${'Genre: ' + movie.genre + ' | Rating: ' + movie.rating + (#strings.isEmpty(movie.year) ? '' : ' | Year: ' + movie.year)}">
                            Genre: Sci-Fi Thriller | Rating: 8.8 | Year: 2010
                        </p>
                    </div>
                    <a class="movie-card__button" th:href="@{|/movie/${movie.slug}|}" data-transition-link>View Details</a>
                </article>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/chrome :: siteFooter()}"></footer>
</body>
</html>
