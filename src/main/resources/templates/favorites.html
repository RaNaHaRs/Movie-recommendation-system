<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appName} + ' | Favorites'">MovieSearch | Favorites</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/site.js}"></script>
</head>
<body class="app-page page-favorites">
<div class="page-loader" aria-hidden="true"></div>
<header th:replace="~{fragments/chrome :: appNavbar('favorites')}"></header>

<main class="dashboard-shell">
    <section class="section-block section-block--list" data-reveal>
        <div class="section-head">
            <h1>Favorites</h1>
        </div>

        <div class="movie-list-shell" th:if="${!#lists.isEmpty(favoritesView.favorites)}">
            <div class="movie-list">
                <article class="movie-list-item" th:each="movie, iter : ${favoritesView.favorites}" th:style="'--list-delay:' + (${iter.index} * 70) + 'ms;'">
                    <div class="movie-list-item__copy">
                        <h3 th:text="${movie.title}">Inception</h3>
                        <p class="movie-list-item__meta" th:text="${'Genre: ' + movie.genre + ' | Rating: ' + movie.rating + (#strings.isEmpty(movie.year) ? '' : ' | Year: ' + movie.year)}">
                            Genre: Sci-Fi Thriller | Rating: 8.8 | Year: 2010
                        </p>
                    </div>
                    <a class="movie-card__button" th:href="@{|/movie/${movie.slug}|}" data-transition-link>View Details</a>
                </article>
            </div>
        </div>

        <div class="empty-panel glass-panel" th:if="${#lists.isEmpty(favoritesView.favorites)}">
            No favorites saved yet.
        </div>
    </section>
</main>

<footer th:replace="~{fragments/chrome :: siteFooter()}"></footer>
</body>
</html>
